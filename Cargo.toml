[package]
name = "srg"
version = "1.5.2"
edition = "2024"
description = "Hardware RNG-based random data generator with high-precision server time sync utility"
license = "MIT"
repository = "https://github.com/krwizxp/srg"
keywords = ["random", "rng", "cli", "time-sync", "utilities"]
categories = ["command-line-utilities", "date-and-time", "encoding"]

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
cargo = { level = "warn", priority = -1 }
style = { level = "warn", priority = -1 }
perf = { level = "warn", priority = -1 }
complexity = { level = "warn", priority = -1 }
correctness = { level = "deny", priority = -1 }
suspicious = { level = "warn", priority = -1 }
restriction = { level = "warn", priority = -1 }
blanket_clippy_restriction_lints = "allow"
implicit_return = "allow"
missing_docs_in_private_items = "allow"
question_mark_used = "allow"
self_named_module_files = "allow"
pub_with_shorthand = "allow"
semicolon_inside_block = "allow"
separated_literal_suffix = "allow"
big_endian_bytes = "allow"
little_endian_bytes = "allow"
non_ascii_literal = "allow"

[profile.release]
codegen-units = 1
lto = "fat"
panic = "abort"
strip = true
