name: CI
on:
  push:
  pull_request:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  build:
    name: ${{ matrix.os }} / rust-1.97.0
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_path: artifacts/srg-linux-x64.tar.gz
            binary_name: srg-linux-x64
          - os: macos-26-intel
            artifact_path: artifacts/srg-macos-x64.tar.gz
            binary_name: srg-macos-x64
          - os: macos-26
            artifact_path: artifacts/srg-macos-arm64.tar.gz
            binary_name: srg-macos-arm64
          - os: windows-latest
            artifact_path: target/release/srg-windows-x64.exe
            binary_name: srg-windows-x64
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        env:
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: init.defaultBranch
          GIT_CONFIG_VALUE_0: main
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.97.0
      - name: Install Linux native dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
      - name: Release Build
        run: cargo build --release --locked
      - name: Prepare Unix artifact
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          mkdir -p artifacts package
          cp target/release/srg "package/${{ matrix.binary_name }}"
          tar -C package -czf "${{ matrix.artifact_path }}" "${{ matrix.binary_name }}"
      - name: Rename Windows artifact file
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Move-Item target\release\srg.exe target\release\${{ matrix.binary_name }}.exe -Force
      - name: Upload Release Binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ matrix.binary_name }}
          path: ${{ matrix.artifact_path }}
          archive: false
          if-no-files-found: error
          retention-days: 14
