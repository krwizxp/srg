name: CI
on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  build:
    name: ${{ matrix.os }} / rust-1.97.1
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary_name: srg-linux-x64
          - os: macos-26-intel
            binary_name: srg-macos-x64
          - os: macos-26
            binary_name: srg-macos-arm64
          - os: windows-latest
            binary_name: srg-windows-x64
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: 1.97.1
      - name: Install Linux native dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
      - name: Release Build
        run: cargo build --release --locked
      - name: Prepare binary artifact with Rust
        if: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
        run: cargo run --locked --example package_artifact -- "${{ matrix.binary_name }}"
      - name: Upload Release Binary
        if: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          path: artifacts/${{ matrix.binary_name }}.*
          archive: false
          if-no-files-found: error
          retention-days: 14
