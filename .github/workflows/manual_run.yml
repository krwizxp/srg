name: Run SRG Manually
on:
  workflow_dispatch:
    inputs:
      action:
        description: Action to run
        required: true
        type: choice
        default: generate-multiple
        options:
          - generate-single
          - generate-multiple
          - ladder
          - random-integer
          - random-float
          - time-sync-observe
      count:
        description: Record count for generate-multiple (1-100000)
        required: true
        default: "10"
        type: string
      players:
        description: Single-line comma-separated player names for ladder (2-512, no empty entries)
        required: true
        default: Alice,Bob
        type: string
      results:
        description: Single-line comma-separated ladder results (same count as players)
        required: true
        default: Win,Lose
        type: string
      int_min:
        description: Minimum integer (-9223372036854775807 or greater)
        required: true
        default: "1"
        type: string
      int_max:
        description: Maximum integer (9223372036854775807 or less)
        required: true
        default: "100"
        type: string
      float_min:
        description: Minimum finite non-subnormal float for random-float
        required: true
        default: "0"
        type: string
      float_max:
        description: Maximum finite non-subnormal float for random-float
        required: true
        default: "1"
        type: string
      time_host:
        description: Host for time-sync-observe
        required: true
        default: www.google.com
        type: string
      observe_seconds:
        description: Seconds to observe server time before stopping (1-60)
        required: true
        default: "10"
        type: string
      artifact_name:
        description: Filename prefix for uploaded artifacts (sanitized, first 80 chars)
        required: true
        default: srg-result
        type: string
permissions:
  contents: read
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.97.0
      - name: Remove build host paths from release binary
        shell: bash
        run: |
          sysroot="$(rustc --print sysroot)"
          printf 'RUSTFLAGS=--remap-path-prefix=%s=/rustc/1.97.0 --remap-path-scope=object\n' "$sysroot" >> "$GITHUB_ENV"
      - name: Install Linux native dependencies
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
      - name: Build release binary
        run: cargo build --release --locked
      - name: Run selected SRG action
        id: run_srg
        shell: bash
        env:
          SRG_ACTION: ${{ inputs.action }}
          SRG_ARTIFACT_NAME: ${{ inputs.artifact_name }}
          SRG_COUNT: ${{ inputs.count }}
          SRG_PLAYERS: ${{ inputs.players }}
          SRG_RESULTS: ${{ inputs.results }}
          SRG_INT_MIN: ${{ inputs.int_min }}
          SRG_INT_MAX: ${{ inputs.int_max }}
          SRG_FLOAT_MIN: ${{ inputs.float_min }}
          SRG_FLOAT_MAX: ${{ inputs.float_max }}
          SRG_TIME_HOST: ${{ inputs.time_host }}
          SRG_OBSERVE_SECONDS: ${{ inputs.observe_seconds }}
        run: bash ./.github/scripts/run-srg.sh
      - name: Upload console log artifact
        if: ${{ always() && steps.run_srg.outputs.log_artifact_path != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ steps.run_srg.outputs.artifact_name_prefix }}-console-log
          path: ${{ steps.run_srg.outputs.log_artifact_path }}
          archive: false
          if-no-files-found: error
          retention-days: 14
      - name: Upload generated data artifact
        if: ${{ always() && steps.run_srg.outputs.data_artifact_path != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ steps.run_srg.outputs.artifact_name_prefix }}-random-data
          path: ${{ steps.run_srg.outputs.data_artifact_path }}
          archive: false
          if-no-files-found: error
          retention-days: 14
