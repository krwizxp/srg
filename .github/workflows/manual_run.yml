name: Run SRG Manually
on:
  workflow_dispatch:
    inputs:
      action:
        description: Action to run
        required: true
        type: choice
        default: generate-multiple
        options:
          - generate-single
          - generate-multiple
          - ladder
          - random-integer
          - random-float
          - time-sync-observe
      count:
        description: Record count for generate-multiple
        required: true
        default: "10"
        type: string
      players:
        description: Comma-separated player names for ladder
        required: true
        default: Alice,Bob
        type: string
      results:
        description: Comma-separated ladder results
        required: true
        default: Win,Lose
        type: string
      int_min:
        description: Minimum integer for random-integer
        required: true
        default: "1"
        type: string
      int_max:
        description: Maximum integer for random-integer
        required: true
        default: "100"
        type: string
      float_min:
        description: Minimum float for random-float
        required: true
        default: "0"
        type: string
      float_max:
        description: Maximum float for random-float
        required: true
        default: "1"
        type: string
      time_host:
        description: Host for time-sync-observe
        required: true
        default: www.google.com
        type: string
      observe_seconds:
        description: Seconds to observe server time before stopping
        required: true
        default: "10"
        type: string
      artifact_name:
        description: Filename prefix for uploaded artifacts
        required: true
        default: srg-result
        type: string
permissions:
  contents: read
jobs:
  run:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - name: Build release binary
        run: cargo build --release --locked
      - name: Run selected SRG action
        id: run_srg
        shell: pwsh
        env:
          SRG_ACTION: ${{ inputs.action }}
          SRG_ARTIFACT_NAME: ${{ inputs.artifact_name }}
          SRG_COUNT: ${{ inputs.count }}
          SRG_PLAYERS: ${{ inputs.players }}
          SRG_RESULTS: ${{ inputs.results }}
          SRG_INT_MIN: ${{ inputs.int_min }}
          SRG_INT_MAX: ${{ inputs.int_max }}
          SRG_FLOAT_MIN: ${{ inputs.float_min }}
          SRG_FLOAT_MAX: ${{ inputs.float_max }}
          SRG_TIME_HOST: ${{ inputs.time_host }}
          SRG_OBSERVE_SECONDS: ${{ inputs.observe_seconds }}
        run: .\.github\scripts\run-srg.ps1
      - name: Upload console log artifact
        if: ${{ always() && steps.run_srg.outputs.log_artifact_path != '' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          path: ${{ steps.run_srg.outputs.log_artifact_path }}
          archive: false
          if-no-files-found: error
          retention-days: 14
      - name: Upload generated data artifact
        if: ${{ always() && steps.run_srg.outputs.data_artifact_path != '' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          path: ${{ steps.run_srg.outputs.data_artifact_path }}
          archive: false
          if-no-files-found: error
          retention-days: 14
